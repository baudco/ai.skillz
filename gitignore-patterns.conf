# Gitignore patterns deployed per-skill.
# deploy-skill.sh reads this file and idempotently
# merges patterns into the target repo's .gitignore.
#
# Format: INI-style sections, one pattern per line.
# Blank lines and #-comments are ignored.
# Paths are relative to the target repo root.

[commit-msg]
.claude/skills/commit-msg/msgs/
.claude/skills/commit-msg/conf.toml
.claude/git_commit_msg_LATEST.md

[pr-msg]
.claude/skills/pr-msg/msgs/
.claude/skills/pr-msg/pr_msg_LATEST.md

[open-wkt]
.claude/wkts/
claude_wkts

[code-review-changes]
.claude/review_context.md
